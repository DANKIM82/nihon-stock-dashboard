name: Update stock data

on:
  schedule:
    # 도쿄 장중 10분마다 (UTC 0:00-6:50 = JST 9:00-15:50)
    - cron: "*/10 0-6 * * 1-5"
    # 장 마감 후 최종 업데이트 (UTC 7:30 = JST 16:30) — 카탈리스트 포함
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest stock data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge 0 ] && [ "$HOUR" -le 6 ]; then
            echo "장중 intraday 모드 (UTC ${HOUR}시)"
            python scripts/fetch_data.py --output data.json --sleep 0.05 --intraday --skip-jpx
          else
            echo "마감 후 full 모드 (UTC ${HOUR}시)"
            python scripts/fetch_data.py --output data.json --sleep 0.3
          fi

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update data.json"
          file_pattern: "data.json short_state.json catalyst_state.json"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
