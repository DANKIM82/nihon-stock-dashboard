name: Update stock data

on:
  schedule:
    # 도쿄 장중 30분마다 (UTC 0:00-6:30 = JST 9:00-15:30)
    - cron: "*/30 0-6 * * 1-5"
    # 장 마감 후 최종 업데이트 (UTC 7:30 = JST 16:30)
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest stock data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_data.py --output data.json --sleep 0.6

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update data.json"
          file_pattern: "data.json"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
