name: Update stock data

on:
  schedule:
    - cron: "30 7 * * 1-5"
  workflow_dispatch:

# Prevent overlapping runs — if another run is in progress, this one waits.
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest stock data
        run: python scripts/fetch_data.py --output data.json --sleep 0.6

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If nothing changed, exit cleanly
          git add data.json
          if git diff --staged --quiet; then
            echo "✓ No changes in data.json — skipping commit"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: auto-update data.json (${TIMESTAMP})"

          # Retry push up to 5 times, pulling+rebasing in between.
          # This handles the case where main advanced while we were running.
          for i in 1 2 3 4 5; do
            echo "::group::Push attempt ${i}"
            git pull --rebase --autostash origin main || true
            if git push origin main; then
              echo "✓ Pushed updated data.json on attempt ${i}"
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Push failed, retrying in 5s..."
            sleep 5
          done

          echo "✗ Failed to push after 5 retries"
          exit 1
