/* ==========================================================================
   Mock data generator & dataset (real TSE tickers)
   ========================================================================== */
function makeSpark(seed, points=20, volatility=0.015) {
  const out = [];
  let v = 100;
  for (let i=0; i<points; i++) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    const rand = (seed % 10000) / 10000 - 0.5;
    v = v * (1 + rand * volatility * 2);
    out.push(Number(v.toFixed(2)));
  }
  return out;
}

const formatJPY = v => '¥' + new Intl.NumberFormat('ja-JP', {maximumFractionDigits:0}).format(v);
const formatMarketCap = b => {
  if (b >= 1000) return `¥${(b/1000).toFixed(2)}T`;
  if (b >= 1)    return `¥${b.toFixed(1)}B`;
  return `¥${(b*1000).toFixed(0)}M`;
};
const formatRatio = v => v == null || Number.isNaN(v) ? '—' : v.toFixed(2);
const formatAdv = v => {
  if (v == null || Number.isNaN(v)) return '—';
  if (v >= 100) return `¥${v.toFixed(0)}B`;
  if (v >= 1)   return `¥${v.toFixed(1)}B`;
  return `¥${(v*1000).toFixed(0)}M`;
};
const formatPercent = (v, withSign=true) => {
  if (v == null || Number.isNaN(v)) return '—';
  const sign = v > 0 && withSign ? '+' : '';
  return `${sign}${v.toFixed(2)}%`;
};
const signColor = v => {
  if (v == null || Number.isNaN(v)) return 'text-sumi-50';
  if (v > 0) return 'text-bull';
  if (v < 0) return 'text-bear';
  return 'text-sumi-50';
};
const signBg = v => {
  if (v == null || Number.isNaN(v)) return 'bg-ivory-100 text-sumi-50';
  if (v > 0) return 'bg-bull-soft text-bull';
  if (v < 0) return 'bg-bear-soft text-bear';
  return 'bg-ivory-100 text-sumi-50';
};

/* ==========================================================================
   Language Context
   ========================================================================== */
const LanguageCtx = createContext(null);
function LanguageProvider({ children }) {
  const [lang, setLangState] = useState('en');
  useEffect(() => {
    try {
      const s = localStorage.getItem('nihon.lang');
      if (s === 'ko' || s === 'en') { setLangState(s); return; }
      if (navigator.language && navigator.language.toLowerCase().startsWith('ko')) setLangState('ko');
    } catch {}
  }, []);
  const setLang = useCallback(l => {
    setLangState(l);
    try { localStorage.setItem('nihon.lang', l); } catch {}
  }, []);
  const toggle = useCallback(() => setLang(lang === 'ko' ? 'en' : 'ko'), [lang, setLang]);
  const t = useCallback(k => dict[k]?.[lang] ?? k, [lang]);
  return <LanguageCtx.Provider value={{ lang, setLang, toggle, t }}>{children}</LanguageCtx.Provider>;
}
const useLanguage = () => useContext(LanguageCtx);

/* ==========================================================================
   Watchlist Context — persists starred tickers to localStorage
   ========================================================================== */
const WatchlistCtx = createContext(null);
function WatchlistProvider({ children }) {
  const [watchlist, setWatchlist] = useState(() => {
    try {
      const raw = localStorage.getItem('nihon.watchlist');
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  });
  const toggle = useCallback((ticker) => {
    setWatchlist(prev => {
      const next = prev.includes(ticker) ? prev.filter(t => t !== ticker) : [...prev, ticker];
      try { localStorage.setItem('nihon.watchlist', JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);
  const isWatched = useCallback((ticker) => watchlist.includes(ticker), [watchlist]);
  return <WatchlistCtx.Provider value={{ watchlist, isWatched, toggle, count: watchlist.length }}>{children}</WatchlistCtx.Provider>;
}
const useWatchlist = () => useContext(WatchlistCtx);

function WatchlistStar({ ticker }) {
  const { isWatched, toggle } = useWatchlist();
  const on = isWatched(ticker);
  return (
    <button
      onClick={(e) => { e.stopPropagation(); toggle(ticker); }}
      aria-label={on ? 'Remove from watchlist' : 'Add to watchlist'}
      className={cn(
        'flex items-center justify-center w-5 h-5 transition-colors',
        on ? 'text-vermillion-500' : 'text-sumi-50/30 hover:text-vermillion-400'
      )}
    >
      <IconStar size={13} filled={on} sw={2}/>
    </button>
  );
}

/* ── Reporter (filer) classification for 5% reports ──────────────────────
   Three buckets drive both the icon and the tone of the explanation:
   activist (🎯 — engagement/pressure likely), passive (📊 — index/benchmark
   money, usually not a governance signal), corporate (🏢 — strategic/related
   party). Matching is substring-based on the Japanese/English filer name. */
const ACTIVIST_FILERS = [
  'オアシス','Oasis','エリオット','Elliott','サード・ポイント','Third Point',
  '3D','スリーディー','シティインデックス','City Index','村上','Murakami',
  'ストラテジックキャピタル','Strategic Capital','エフィッシモ','Effissimo',
  'アスリード','Asuka','ダルトン','Dalton','ValueAct','バリューアクト',
  'RMBキャピタル','RMB','カーライル','Carlyle','レノ','Reno','南青山',
  'シルチェスター','Silchester','インディペンデント・フランチャイズ','Nippon Active',
  'ニッポン・アクティブ','フェニックス','Phoenix','光通信','タワー投資',
];
const PASSIVE_FILERS = [
  'ブラックロック','BlackRock','バンガード','Vanguard','ステート・ストリート','State Street',
  '野村','Nomura','日興','Nikko','大和','Daiwa','三井住友','Sumitomo Mitsui',
  'みずほ','Mizuho','三菱UFJ','Mitsubishi UFF','ニッセイ','Nissay','アセットマネジメント',
  'Asset Management','フィデリティ','Fidelity','ベイリー・ギフォード','Baillie Gifford',
  'キャピタル・リサーチ','Capital Research','JPモルガン','JPMorgan','ゴールドマン','Goldman',
  'モルガン・スタンレー','Morgan Stanley','UBS','Schroder','シュローダー','インベスコ','Invesco',
  'T.ロウ','T. Rowe','GIC','Norges','ノルウェー',
];
function classifyFiler(filer) {
  if (!filer) return 'unknown';
  if (ACTIVIST_FILERS.some(k => filer.includes(k))) return 'activist';
  if (PASSIVE_FILERS.some(k => filer.includes(k))) return 'passive';
  // a 株式会社/銀行/Inc that isn't a known fund → treat as corporate/related
  if (/(株式会社|銀行|ホールディングス|Holdings|Inc|Corp|Ltd|生命|保険)/.test(filer))
    return 'corporate';
  return 'unknown';
}
const FILER_BADGE = {
  activist:  { icon:'🎯', ko:'행동주의', en:'Activist',  cls:'bg-vermillion-50 text-vermillion-600' },
  passive:   { icon:'📊', ko:'패시브·기관', en:'Passive/Inst.', cls:'bg-ivory-100 text-sumi-50' },
  corporate: { icon:'🏢', ko:'사업회사·관계자', en:'Corporate/Related', cls:'bg-ivory-100 text-sumi-50' },
  unknown:   { icon:'',  ko:'',          en:'',          cls:'' },
};

/* ── Bilingual translation + plain-language explanation per event ────────
   Returns { titleKo, titleEn, shortKo, shortEn, longKo, longEn }.
   `ev.title` is the raw Japanese; we key off ev.type and (for 5%) the filer
   class rather than parsing free text, so it stays robust. */
function explainEvent(ev, stockName) {
  const nm = stockName || (lang => lang === 'ko' ? '해당 종목' : 'the issuer');
  const name = typeof nm === 'function' ? null : nm;
  const N = name || '해당 종목';
  const NE = name || 'the issuer';
  const isNew = ev.title && ev.title.includes('新規') || (ev.title && ev.title.includes('신규'));
  const variant = ev.title && (ev.title.includes('変更') || ev.title.includes('변경')) ? 'change' : 'new';

  if (ev.type === '5pct') {
    const cls = classifyFiler(ev.filer);
    const filer = ev.filer || (lang === 'ko' ? '한 기관' : 'an institution');
    const verb = variant === 'change'
      ? { ko:'대량보유 지분에 변동이 발생', en:'changed its large-shareholding position' }
      : { ko:'지분을 5% 이상 신규 취득', en:'newly crossed the 5% ownership threshold' };
    const titleKo = `${filer}이(가) ${N}의 ${verb.ko} (대량보유보고서)`;
    const titleEn = `${filer} ${verb.en} in ${NE} (large-shareholding report)`;
    const EXP = {
      activist: {
        shortKo:'🎯 행동주의 펀드의 지분 신고 — 경영 개입·주주제안 가능성에 주목.',
        shortEn:'🎯 An activist fund filing — watch for engagement or shareholder proposals.',
        longKo:`행동주의 성향으로 분류되는 ${filer}이(가) 5% 이상을 신고했습니다. 이런 펀드는 단순 투자보다 이사회 구성, 자본배치(자사주·배당), 분할·매각 등을 요구하며 주가 촉매가 되는 경우가 많습니다. 변경보고서라면 지분을 늘렸는지 줄였는지(증액=압박 강화 신호)를 확인하세요.`,
        longEn:`${filer}, classified as activist-leaning, has crossed 5%. Such funds often push for board change, capital allocation (buybacks/dividends), or breakups rather than passively holding — frequently a share-price catalyst. If this is a change report, check whether the stake rose (escalation) or fell.`,
      },
      passive: {
        shortKo:'📊 대형 운용사의 지분 신고 — 대개 인덱스·벤치마크 자금으로 거버넌스 신호는 약함.',
        shortEn:'📊 A large asset manager filing — usually index/benchmark money, a weak governance signal.',
        longKo:`${filer}은(는) 패시브·기관 자금으로 분류됩니다. 5% 신고는 의무 공시일 뿐, 대개 인덱스 편입이나 벤치마크 추종에 따른 것으로 경영 개입 의도는 약합니다. 다만 액티브 운용 부문이라면 종목 선택의 신뢰 신호로 읽을 수도 있습니다.`,
        longEn:`${filer} is classified as passive/institutional. A 5% filing here is largely a disclosure obligation tied to index inclusion or benchmark tracking, with little activist intent. That said, if it's their active strategy, it can be read as a conviction signal.`,
      },
      corporate: {
        shortKo:'🏢 사업회사·관계자의 지분 신고 — 전략적 제휴나 그룹 내 지분 관계일 수 있음.',
        shortEn:'🏢 A corporate/related party filing — may reflect a strategic tie or intra-group holding.',
        longKo:`${filer}은(는) 사업회사 또는 관계자로 보입니다. 이런 5% 신고는 전략적 제휴, 정책보유주식(政策保有株), 그룹 재편, 또는 모자회사 관계와 연관된 경우가 많습니다. 일본 거버넌스 개혁의 핵심 이슈인 '정책보유주식 축소'와 반대 방향일 수 있어 맥락 확인이 필요합니다.`,
        longEn:`${filer} appears to be a corporate or related party. Such filings often relate to strategic alliances, cross-shareholdings (政策保有株), group restructuring, or parent-subsidiary ties — worth contextualizing against Japan's governance push to unwind cross-holdings.`,
      },
      unknown: {
        shortKo:'한 투자자가 5% 이상 지분을 신고했습니다.',
        shortEn:'An investor has filed a 5%+ ownership report.',
        longKo:`${filer}이(가) ${N}의 지분 5% 이상을 신고했습니다. 보고자의 성격(행동주의/패시브/사업회사)에 따라 의미가 달라지므로, 보고자명을 확인해 의도를 가늠하세요.`,
        longEn:`${filer} has reported a 5%+ stake in ${NE}. The significance depends on who is filing — check the filer to gauge intent.`,
      },
    };
    return { titleKo, titleEn, filerClass: cls, ...EXP[cls] };
  }

  if (ev.type === 'buyback') {
    return {
      titleKo:`${N} 자사주 취득 관련 공시`,
      titleEn:`${NE} share buyback disclosure`,
      shortKo:'자사주 매입 — 주당가치 상승·주가 부양 요인.',
      shortEn:'Share buyback — accretive to per-share value and typically supportive of the price.',
      longKo:`회사가 자기주식을 사들이는 공시입니다. 유통주식 수가 줄어 EPS·ROE가 개선되고, 경영진이 주가를 저평가로 본다는 신호로 해석됩니다. 일본에서는 자본효율 개혁(자본비용·주가를 의식한 경영)의 대표적 실행 수단이라, 밸류업 관점에서 긍정적 촉매입니다. 규모(취득 한도/발행주식 대비 %)와 실제 집행 여부를 확인하세요.`,
      longEn:`The company is repurchasing its own shares. This shrinks the share count (boosting EPS/ROE) and signals management sees the stock as undervalued. In Japan it's a flagship tool of the capital-efficiency reform push, so it's a positive value-up catalyst. Check the size (limit as % of shares outstanding) and actual execution.`,
    };
  }
  if (ev.type === 'tob') {
    return {
      titleKo:`${N} 공개매수(TOB) 관련 공시`,
      titleEn:`${NE} tender offer (TOB) disclosure`,
      shortKo:'공개매수 — 경영권 인수·비공개화 가능성, 보통 프리미엄 수반.',
      shortEn:'Tender offer — a takeover or take-private, usually at a premium.',
      longKo:`특정 주체가 시장 밖에서 정해진 가격에 주식을 사 모으는 공개매수입니다. 통상 시장가 대비 프리미엄이 붙으며, 경영권 인수·완전자회사화·비공개화(going-private)로 이어집니다. 매수가격·매수자·목적(우호적/적대적), 그리고 소수주주 보호 장치(공정성 의견 등)를 확인하세요. 이벤트드리븐 관점에서 핵심 촉매입니다.`,
      longEn:`A party is buying shares off-market at a fixed price. Tenders usually carry a premium and lead to a takeover, full subsidiarization, or going-private. Check the offer price, the bidder, whether it's friendly or hostile, and minority-protection terms (fairness opinions). A core event-driven catalyst.`,
    };
  }
  if (ev.type === 'mbo') {
    return {
      titleKo:`${N} MBO(경영진 매수) 관련 공시`,
      titleEn:`${NE} management buyout (MBO) disclosure`,
      shortKo:'MBO — 경영진이 회사를 사들여 상장폐지하는 거래, 프리미엄 수반.',
      shortEn:'MBO — management buying out the company to delist, at a premium.',
      longKo:`경영진이 자금을 모아 자사 주식을 사들이고 상장폐지하는 거래입니다. 보통 프리미엄이 붙지만, 경영진이 매수자이자 매도 측 의사결정자라는 이해상충 때문에 가격의 공정성이 쟁점이 됩니다. 소수주주 보호(다수of소수 조건, 특별위원회, 공정성 의견)를 반드시 확인하세요. 행동주의가 'MBO 가격이 낮다'며 개입하는 경우도 많습니다.`,
      longEn:`Management raises capital to buy out the company and delist it. Usually at a premium, but the inherent conflict (management is both buyer and seller-side decision-maker) makes price fairness the key issue. Scrutinize minority protections (majority-of-minority, special committee, fairness opinion). Activists often intervene arguing the MBO price is too low.`,
    };
  }
  if (ev.type === 'guidance') {
    return {
      titleKo:`${N} 실적예상 수정 공시`,
      titleEn:`${NE} earnings guidance revision`,
      shortKo:'실적 가이던스 수정 — 상향이면 호재, 하향이면 악재.',

      longKo:`회사가 기존 실적 전망치를 바꾼 공시입니다. 상향(上方修正)이면 긍정적, 하향(下方修正)이면 부정적입니다. 매출·영업이익·순이익·배당 중 무엇이 바뀌었는지, 그리고 일회성인지 구조적인지 확인하세요. 원문에 '上方'이 있으면 상향, '下方'이면 하향입니다.`,
      longEn:`The company revised its earnings forecast. An upward revision (上方修正) is positive; downward (下方修正) is negative. Check which line (revenue, operating/net profit, dividend) moved and whether it's one-off or structural. '上方' = up, '下方' = down in the original.`,
    };
  }
  if (ev.type === 'dividend') {
    return {
      titleKo:`${N} 배당예상 수정 공시`,
      titleEn:`${NE} dividend forecast revision`,

      shortEn:'Dividend revision — an increase signals stronger shareholder returns.',
      longKo:`배당 전망을 바꾼 공시입니다. 증액(増配)은 주주환원 강화·이익 자신감의 신호로 긍정적이고, 감액(減配)은 그 반대입니다. 자본효율 개혁 흐름에서 증배는 자사주 매입과 함께 핵심 밸류업 수단입니다. 원문의 '増配'(증액)/'減配'(감액)을 확인하세요.`,
      longEn:`The company revised its dividend outlook. An increase (増配) signals stronger shareholder returns and earnings confidence (positive); a cut (減配) is the opposite. Alongside buybacks, dividend hikes are a core value-up lever in the reform era. Look for '増配' (up) vs '減配' (cut).`,
    };
  }
  // fallback
  return {
    titleKo: ev.title, titleEn: ev.title,
    shortKo:'적시공시 이벤트입니다.', shortEn:'A timely-disclosure event.',
    longKo: ev.title, longEn: ev.title,
  };
}

/* Single catalyst row: raw JP title + translated title + filer badge +
   toggleable plain-language explanation (short by default, long on click). */
function CatalystItem({ ev, stockName, lang }) {
  const [open, setOpen] = React.useState(false);
  const ex = explainEvent(ev, stockName);
  const title = lang === 'ko' ? ex.titleKo : ex.titleEn;
  const short = lang === 'ko' ? ex.shortKo : ex.shortEn;
  const long = lang === 'ko' ? ex.longKo : ex.longEn;
  const fb = ev.type === '5pct' ? FILER_BADGE[ex.filerClass || 'unknown'] : null;
  return (
    <li className="px-3 py-2.5">
      <div className="flex items-start gap-2.5">
        <span className="font-mono text-[10px] text-sumi-50 tabular pt-0.5 flex-shrink-0 w-[68px]">{ev.date}</span>
        <span className={cn('flex-shrink-0 px-1.5 py-0.5 text-[10px] font-semibold uppercase tracking-wide', catCls(ev.type))}>
          {catLabel(ev.type, lang)}
        </span>
        {fb && fb.icon && (
          <span className={cn('flex-shrink-0 px-1.5 py-0.5 text-[10px] font-semibold', fb.cls)}
            title={lang === 'ko' ? '보고자 유형' : 'Filer type'}>
            {fb.icon} {lang === 'ko' ? fb.ko : fb.en}
          </span>
        )}
      </div>
      <div className="mt-1.5 pl-[78px]">
        {/* translated headline */}
        <p className="text-[11px] text-sumi-100 leading-snug font-medium">{title}</p>
        {/* raw Japanese original */}
        <p className="text-[10px] text-sumi-50 mt-0.5 leading-snug">
          <span className="text-sumi-40">原文:</span> {ev.title}
          {ev.filer && <span className="text-sumi-40"> · {ev.filer}</span>}
        </p>
        {/* explanation: short always, long on toggle */}
        <div className="mt-1.5 bg-ivory-50 border-l-2 border-vermillion-300 pl-2 py-1">
          <p className="text-[11px] text-sumi-90 leading-snug">{open ? long : short}</p>

/* ==========================================================================
   Long/Short Book Context — persists positions to localStorage
   ========================================================================== */
const BookCtx = createContext(null);
function BookProvider({ children }) {
  const [book, setBook] = useState(() => {
    try {
      const raw = localStorage.getItem('nihon.book');
      return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
  });
  const persist = next => { try { localStorage.setItem('nihon.book', JSON.stringify(next)); } catch {} };
  const setEntry = useCallback((ticker, patch) => {
    setBook(prev => {
      const next = { ...prev, [ticker]: { side:'L', weight:0, ...(prev[ticker]||{}), ...patch } };
      persist(next);
      return next;
    });
  }, []);
  const removeEntry = useCallback((ticker) => {
    setBook(prev => {
      const next = { ...prev };
      delete next[ticker];
      persist(next);
      return next;
    });
  }, []);
  return <BookCtx.Provider value={{ book, setEntry, removeEntry }}>{children}</BookCtx.Provider>;
}
const useBook = () => useContext(BookCtx);

function PortfolioBook({ stocks }) {
  const { lang, t } = useLanguage();
  const { watchlist, toggle } = useWatchlist();
  const { book, setEntry } = useBook();

  const rows = useMemo(() => {
    const byT = Object.fromEntries(stocks.map(s => [s.ticker, s]));
    return watchlist.map(tk => byT[tk]).filter(Boolean).map(s => {
      const e = book[s.ticker] || { side:'L', weight:0 };
      const w = Number(e.weight) || 0;
      return { ...s, side: e.side === 'S' ? 'S' : 'L', weight: w, signed: e.side === 'S' ? -w : w };
    });
  }, [stocks, watchlist, book]);

  const longs = rows.filter(r => r.side === 'L');
  const shorts = rows.filter(r => r.side === 'S');
  const longExp = longs.reduce((a,r) => a + r.weight, 0);
  const shortExp = shorts.reduce((a,r) => a + r.weight, 0);
  const gross = longExp + shortExp;
  const net = longExp - shortExp;

  const sectorExp = useMemo(() => {
    const m = {};
    rows.forEach(r => { m[r.sector] = (m[r.sector] || 0) + r.signed; });
    return Object.entries(m).map(([sector, v]) => ({ sector, v: Math.round(v*100)/100 }))
      .sort((a,b) => Math.abs(b.v) - Math.abs(a.v));
  }, [rows]);
  const maxAbs = Math.max(...sectorExp.map(s => Math.abs(s.v)), 1);

  const wavg = (arr, key) => {
    const xs = arr.filter(r => r[key] != null && r.weight > 0);
    const W = xs.reduce((a,r) => a + r.weight, 0);
    if (!W) return null;
    return xs.reduce((a,r) => a + r[key]*r.weight, 0) / W;
  };
  const legStats = leg => ({
    pbr: wavg(leg, 'pbr'), per: wavg(leg, 'per'),
    shortPct: wavg(leg, 'shortPct'), valZ: wavg(leg, 'valZ'),
  });
  const L = legStats(longs), S = legStats(shorts);
  const fmt = (v, d=2) => v == null ? '—' : v.toFixed(d);

  const exportCsv = () => {
    const head = 'ticker,name,side,weight_pct,price,changePct,pbr,per,roe,shortPct,dtc,advValueB,valZ';
    const lines = rows.map(r => [r.ticker, '"'+(lang==='ko'?r.nameKo:r.nameEn)+'"', r.side, r.weight,
      r.price, r.changePercent, r.pbr, r.per, r.roe, r.shortPct, r.shortDtc, r.advValueB, r.valZ]
      .map(v => v == null ? '' : v).join(','));
    const blob = new Blob([[head, ...lines].join('\n')], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `nihon_book_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  if (rows.length === 0) {
    return (
      <div className="bg-white border border-neutral-line p-10 text-center">
        <IconStar size={18} className="mx-auto mb-3 text-sumi-50"/>
        <div className="text-sm text-sumi-50 max-w-md mx-auto leading-relaxed">{t('bookEmpty')}</div>

  return (

      <div className="grid grid-cols-2 md:grid-cols-5 divide-x divide-neutral-line border-b border-neutral-line bg-ivory-50">
        {[
          { label: t('bookGross'), v: `${gross.toFixed(1)}%` },
          { label: t('bookNet'), v: `${net > 0 ? '+' : ''}${net.toFixed(1)}%`, color: net > 0 ? 'text-bull' : net < 0 ? 'text-bear' : undefined },
          { label: t('bookLongExp'), v: `${longExp.toFixed(1)}%`, color: 'text-bull' },
          { label: t('bookShortExp'), v: `−${shortExp.toFixed(1)}%`, color: 'text-bear' },
          { label: t('bookPositions'), v: `${longs.length}L / ${shorts.length}S` },

          </div>
        ))}
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="bg-ivory-50 border-b border-neutral-line text-[10px] uppercase tracking-[0.14em] text-sumi-50">
              <th className="px-3 h-9 text-left font-medium">{t('colTicker')}</th>

const Badge = ({ variant='default', size='xs', className='', children }) => {
  const sizeCls = size === 'xs' ? 'px-1.5 py-0.5 text-[10px]' : 'px-2 py-0.5 text-xs';
  const variantCls = {
    default: 'bg-ivory-100 text-sumi-100',
    accent: 'bg-vermillion-50 text-vermillion-600',
    bull: 'bg-bull-soft text-bull',
    bear: 'bg-bear-soft text-bear',
    outline: 'border border-neutral-line text-sumi-100',
  }[variant];
  return <span className={cn('inline-flex items-center gap-1 font-medium tracking-wide uppercase tabular', sizeCls, variantCls, className)}>{children}</span>;
};

function Sparkline({ data, width=72, height=24, positive, className }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => {
    const x = (i / (data.length-1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x.toFixed(2)},${y.toFixed(2)}`;
  }).join(' ');
  const goingUp = positive !== undefined ? positive : data[data.length-1] >= data[0];
  const stroke = goingUp ? '#2E7D57' : '#B8342A';
  const fill = goingUp ? 'rgba(46,125,87,.10)' : 'rgba(184,52,42,.10)';
  const areaPath = `M 0,${height} L ${pts.replace(/\s+/g,' L ')} L ${width},${height} Z`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className={className} aria-hidden="true">
      <path d={areaPath} fill={fill} stroke="none" />
      <polyline points={pts} fill="none" stroke={stroke} strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function MarketSummary({ summary }) {
  const { t } = useLanguage();
  if (!summary) return null;
  const { advancers=0, decliners=0, unchanged=0, belowBookCount=0, avgPer=0, avgPbr=0, avgDiv=0, totalListings=0 } = summary;
  const totalMoving = advancers + decliners + unchanged;

function heatColor(pct) {
  const clamped = Math.max(-2, Math.min(2, pct));
  const intensity = Math.abs(clamped) / 2;
  if (clamped > 0.05) {
    const alpha = 0.15 + intensity * 0.55;
    return `rgba(46, 125, 87, ${alpha.toFixed(3)})`;
  }
  if (clamped < -0.05) {
    const alpha = 0.15 + intensity * 0.55;
    return `rgba(184, 52, 42, ${alpha.toFixed(3)})`;
  }
  return 'rgba(230, 225, 212, 0.6)';
}
function SectorHeatmap({ sectors }) {
  const { lang, t } = useLanguage();
  if (!sectors || !sectors.length) return null;
  const total = sectors.reduce((s,x) => s + x.count, 0);
  const tiles = sectors.map(s => ({...s, weight: s.count/total})).sort((a,b) => b.weight - a.weight);
  return (
    <div className="space-y-4" id="sectors">
      <div>
        <div className="text-[11px] tracking-[0.28em] uppercase text-sumi-50 mb-2">{t('sectionSectors')}</div>
        <h3 className="font-display text-[28px] leading-tight tracking-tight text-sumi-300">{t('sectionSectors')}</h3>
      </div>
      <Card className="p-5">
        <div className="grid grid-cols-12 gap-1 auto-rows-[72px]">
          {tiles.map(tile => {
            const span = Math.max(2, Math.min(6, Math.round(tile.weight * 24)));
            const textCol = Math.abs(tile.changePercent) > 1.0 ? '#FFFFFF' : '#1A1A18';
            return (
              <div key={tile.sector}
                className="relative p-2.5 border border-white/30 transition-all cursor-default group hover:ring-1 hover:ring-sumi-300/40"
                style={{ gridColumn: `span ${span} / span ${span}`, backgroundColor: heatColor(tile.changePercent), color: textCol }}>
                <div className="flex flex-col justify-between h-full">
                  <div className="text-[11px] font-semibold leading-tight truncate">{localizedSector(tile.sector, lang)}</div>
                  <div className="flex items-baseline justify-between gap-1">
                    <span className="font-display font-semibold text-base tabular leading-none">{formatPercent(tile.changePercent)}</span>
                    <span className="text-[9px] opacity-70 tabular">PBR {tile.avgPbr.toFixed(2)}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div className="mt-4 pt-4 border-t border-neutral-line flex items-center justify-between text-[10px] text-sumi-50">
          <span className="tracking-[0.2em] uppercase">{lang === 'ko' ? '일일 변동 (%)' : 'Daily Change (%)'}</span>
          <div className="flex items-center gap-2">
            <span className="tabular">-2%</span>
            <div className="flex h-2 w-40">
              {[-2,-1.2,-0.4,0,0.4,1.2,2].map((v,i) => (
                <div key={i} className="flex-1" style={{ backgroundColor: heatColor(v) }} />
              ))}
            </div>
            <span className="tabular">+2%</span>
          </div>
        </div>
      </Card>
    </div>
  );
}

// pretty axis numbers — kill floating-point noise like 3.415000000006
const niceNum = v => {
  if (!isFinite(v)) return '';
  const a = Math.abs(v);
  if (a >= 100) return Math.round(v).toString();
  if (a >= 10) return v.toFixed(0);
  if (a >= 1) return v.toFixed(1);
  return v.toFixed(2).replace(/\.?0+$/, '');
};
// quantile helper for winsorization
const quantile = (sorted, q) => {
  if (!sorted.length) return 0;
  const pos = (sorted.length - 1) * q;
  const base = Math.floor(pos), rest = pos - base;
  return sorted[base + 1] !== undefined
    ? sorted[base] + rest * (sorted[base + 1] - sorted[base])
    : sorted[base];
};

// Sector colour palette — tuned to the dashboard's earth-tone aesthetic so
// 11 categories stay distinguishable without going neon.
const SECTOR_META = {
  Technology:            { ko:'기술',       en:'Technology',          c:'#C7391C' },
  Financials:            { ko:'금융',       en:'Financials',          c:'#2E7D57' },
  Industrials:           { ko:'산업재',     en:'Industrials',         c:'#3A6EA5' },
  ConsumerDiscretionary: { ko:'경기소비재', en:'Cons. Discretionary', c:'#D98324' },
  ConsumerStaples:       { ko:'필수소비재', en:'Cons. Staples',       c:'#7B9E3F' },
  Healthcare:            { ko:'헬스케어',   en:'Healthcare',          c:'#B0457B' },
  Materials:             { ko:'소재',       en:'Materials',           c:'#8A6D3B' },
  Communication:         { ko:'커뮤니케이션', en:'Communication',     c:'#5C6BC0' },
  Energy:                { ko:'에너지',     en:'Energy',              c:'#C28800' },
  Utilities:             { ko:'유틸리티',   en:'Utilities',           c:'#4C8C8C' },
  RealEstate:            { ko:'부동산',     en:'Real Estate',         c:'#9C5A3C' },
};
const SECTOR_FALLBACK = '#6B6A65';
const SEGMENT_META = {
  Prime:    { ko:'프라임',   en:'Prime',    c:'#C7391C' },
  Standard: { ko:'스탠다드', en:'Standard', c:'#3A6EA5' },
  Growth:   { ko:'그로스',   en:'Growth',   c:'#2E7D57' },
};
const SEGMENT_FALLBACK = '#6B6A65';

// Custom scatter marker: circle for in-range points, a small triangle pointing
// outward for clamped outliers (so they read as "beyond the edge" instead of
// rendering as a half-clipped circle on the border).
function ValuationDot(props) {
  const { cx, cy, payload, fill, fillOpacity, stroke } = props;
  if (cx == null || cy == null) return null;
  const clamped = payload.clampedX || payload.clampedY;
  if (!clamped) {
    return <circle cx={cx} cy={cy} r={payload._r} fill={fill}
      fillOpacity={fillOpacity} stroke={stroke} strokeOpacity={fillOpacity * 0.6} />;
  }
  // direction the point is "escaping" toward
  const dx = payload.clampedX ? (payload._edgeRight ? 1 : -1) : 0;
  const dy = payload.clampedY ? (payload._edgeTop ? -1 : 1) : 0;
  const sz = 5;
  // nudge inward a touch so the triangle isn't clipped by the plot edge
  const px = cx - dx * 3, py = cy - dy * 3;
  let pts;
  if (dx !== 0 && dy === 0) {           // left/right → horizontal triangle
    pts = dx > 0
      ? `${px+sz},${py} ${px-sz},${py-sz} ${px-sz},${py+sz}`
      : `${px-sz},${py} ${px+sz},${py-sz} ${px+sz},${py+sz}`;
  } else if (dy !== 0 && dx === 0) {    // up/down → vertical triangle
    pts = dy < 0
      ? `${px},${py-sz} ${px-sz},${py+sz} ${px+sz},${py+sz}`
      : `${px},${py+sz} ${px-sz},${py-sz} ${px+sz},${py-sz}`;
  } else {                              // corner → diamond
    pts = `${px},${py-sz} ${px+sz},${py} ${px},${py+sz} ${px-sz},${py}`;
  }
  return <polygon points={pts} fill={fill} fillOpacity={Math.max(fillOpacity, 0.9)}
    stroke={stroke} strokeWidth={1.2} strokeOpacity={1} />;
}

function AxisControl({ label, lo, hi, onLo, onHi, suffix }) {

}

function ValuationChart({ data }) {
  const { lang } = useLanguage();
  const [quadrant, setQuadrant] = useState('all');
  const [logScale, setLogScale] = useState(true);
  const [manual, setManual] = useState(false);
  const [colorMode, setColorMode] = useState('quadrant');  // quadrant | sector | segment
  // manual bounds (PBR in real units; ROE in %)
  const [pbrLo, setPbrLo] = useState(''); const [pbrHi, setPbrHi] = useState('');
  const [roeLo, setRoeLo] = useState(''); const [roeHi, setRoeHi] = useState('');

  const raw = useMemo(() => data.filter(s => s.pbr !== null && s.roe !== null && s.pbr > 0)
    .map(s => ({
      ticker: s.ticker,
      name: lang === 'ko' ? s.nameKo : s.nameEn,
      pbr: s.pbr, roe: s.roe, z: s.marketCapB,
      belowBook: s.belowBook, changePercent: s.changePercent,
      sector: s.sector, segment: s.segment,
    })), [data, lang]);

  // ── Auto bounds via winsorization (2nd–98th percentile) so a single PBR=23
  //    or ROE=-47 outlier doesn't compress everyone into a corner ───────────
  const auto = useMemo(() => {
    if (!raw.length) return { pbrLo:0.2, pbrHi:8, roeLo:-20, roeHi:30 };
    const pbrs = raw.map(p => p.pbr).sort((a,b)=>a-b);
    const roes = raw.map(p => p.roe).sort((a,b)=>a-b);
    return {
      pbrLo: Math.max(0.1, quantile(pbrs, 0.0)),
      pbrHi: quantile(pbrs, 0.98),
      roeLo: Math.min(0, quantile(roes, 0.02)),
      roeHi: quantile(roes, 0.98),
    };
  }, [raw]);

  // effective bounds: manual overrides where provided, else auto
  const b = {
    pbrLo: manual && pbrLo !== '' ? pbrLo : auto.pbrLo,
    pbrHi: manual && pbrHi !== '' ? pbrHi : auto.pbrHi,
    roeLo: manual && roeLo !== '' ? roeLo : auto.roeLo,
    roeHi: manual && roeHi !== '' ? roeHi : auto.roeHi,
  };

  // x transform: log10(pbr) when logScale, else raw pbr
  const fx = v => logScale ? Math.log10(Math.max(v, 0.01)) : v;
  const xLo = fx(b.pbrLo), xHi = fx(b.pbrHi);
  const yLo = b.roeLo, yHi = b.roeHi;

  // build plotted points, clamping out-of-range to the edges (with a flag)
  const points = useMemo(() => raw.map(p => {
    let x = fx(p.pbr), y = p.roe, cx = false, cy = false, eR = false, eT = false;
    if (x < xLo) { x = xLo; cx = true; } else if (x > xHi) { x = xHi; cx = true; eR = true; }
    if (y < yLo) { y = yLo; cy = true; } else if (y > yHi) { y = yHi; cy = true; eT = true; }
    const _r = Math.min(14, Math.max(4, Math.sqrt(p.z) / 12));
    const secMeta = SECTOR_META[p.sector];
    const segMeta = SEGMENT_META[p.segment];
    return { ...p, x, y, clampedX: cx, clampedY: cy, _edgeRight: eR, _edgeTop: eT, _r,
      _secLabel: secMeta ? secMeta[lang] : p.sector,
      _segLabel: segMeta ? segMeta[lang] : p.segment,
      _dotColor: (colorMode === 'sector' ? (secMeta||{}).c
                : colorMode === 'segment' ? (segMeta||{}).c : null) || null };
  }), [raw, xLo, xHi, yLo, yHi, logScale, lang, colorMode]);

  const nClamped = points.filter(p => p.clampedX || p.clampedY).length;

  // tick marks: for log scale use canonical PBR values within range
  const xTicks = useMemo(() => {
    if (!logScale) {
      const ticks = []; const step = (b.pbrHi - b.pbrLo) / 5;
      for (let i = 0; i <= 5; i++) ticks.push(fx(b.pbrLo + step * i));
      return ticks;
    }
    const cands = [0.25, 0.5, 0.75, 1, 1.5, 2, 3, 5, 8, 12, 20, 30];
    return cands.filter(v => v >= b.pbrLo * 0.95 && v <= b.pbrHi * 1.05).map(fx);
  }, [logScale, b.pbrLo, b.pbrHi]);
  const xTickLabel = lv => niceNum(logScale ? Math.pow(10, lv) : lv);

  const classify = p => {
    if (p.pbr < 1 && p.roe > 8) return 'undervalued';
    if (p.pbr >= 1 && p.roe > 15) return 'quality';
    if (p.pbr < 1 && p.roe <= 8) return 'value-trap';
    if (p.pbr > 3 && p.roe < 10) return 'expensive';
    return 'all';
  };
  const colorFor = p => {
    if (colorMode === 'sector')
      return (SECTOR_META[p.sector] || {}).c || SECTOR_FALLBACK;
    if (colorMode === 'segment')
      return (SEGMENT_META[p.segment] || {}).c || SEGMENT_FALLBACK;
    return ({ undervalued:'#C7391C', quality:'#2E7D57',
      'value-trap':'#B8342A', expensive:'#6B6A65' }[classify(p)] || '#1A1A18');
  };
  const visibleOpacity = p => quadrant === 'all' ? 0.85 : (classify(p) === quadrant ? 0.95 : 0.12);
  // quadrant shading fades right out in sector/segment modes (just a hint)
  const shadeMul = colorMode === 'quadrant' ? 1 : 0.25;

  const resetAxes = () => { setManual(false); setPbrLo(''); setPbrHi(''); setRoeLo(''); setRoeHi(''); };

  return (
    <Card className="overflow-hidden">
      <div className="flex flex-wrap items-center justify-between gap-3 px-5 py-4 border-b border-neutral-line bg-ivory-50">
        <div className="flex flex-wrap items-center gap-2">
          <QuadrantPill label={lang === 'ko' ? '전체' : 'All'} active={quadrant==='all'} onClick={() => setQuadrant('all')} color="neutral"/>
          <QuadrantPill label={lang === 'ko' ? '저평가 우량 (PBR<1, ROE>8)' : 'Undervalued Quality (PBR<1, ROE>8)'} active={quadrant==='undervalued'} onClick={() => setQuadrant('undervalued')} color="vermillion"/>
          <QuadrantPill label={lang === 'ko' ? '퀄리티 컴파운더 (ROE>15)' : 'Quality Compounders (ROE>15)'} active={quadrant==='quality'} onClick={() => setQuadrant('quality')} color="bull"/>
          <QuadrantPill label={lang === 'ko' ? '밸류 트랩' : 'Value Trap'} active={quadrant==='value-trap'} onClick={() => setQuadrant('value-trap')} color="bear"/>
        </div>
        <div className="text-[10px] uppercase tracking-[0.18em] text-sumi-50 tabular">{points.length} {lang === 'ko' ? '종목' : 'securities'}</div>
      </div>

      {/* axis controls */}
      <div className="flex flex-wrap items-center gap-x-4 gap-y-2 px-5 py-2.5 border-b border-neutral-line bg-white">
        <button onClick={() => setLogScale(l => !l)}
          className={cn('inline-flex items-center gap-1.5 px-2.5 h-6 text-[10px] font-medium uppercase tracking-wider transition-all border',
            logScale ? 'bg-sumi-300 text-ivory-50 border-sumi-300' : 'bg-white text-sumi-100 border-neutral-line hover:bg-ivory-100')}>
          {logScale ? (lang==='ko'?'PBR 로그축 ✓':'Log PBR ✓') : (lang==='ko'?'PBR 선형축':'Linear PBR')}
        </button>
        <button onClick={() => setManual(m => !m)}
          className={cn('inline-flex items-center gap-1.5 px-2.5 h-6 text-[10px] font-medium uppercase tracking-wider transition-all border',
            manual ? 'bg-vermillion-500 text-white border-vermillion-500' : 'bg-white text-sumi-100 border-neutral-line hover:bg-ivory-100')}>
          {lang==='ko'?'수동 축 조정':'Manual axes'}
        </button>
        <span className="w-px h-5 bg-neutral-line mx-0.5" />
        <span className="text-[10px] uppercase tracking-wider text-sumi-50">{lang==='ko'?'색상':'Color'}</span>
        <div className="inline-flex border border-neutral-line overflow-hidden">
          {[['quadrant', lang==='ko'?'사분면':'Quadrant'],
            ['sector',   lang==='ko'?'섹터':'Sector'],
            ['segment',  lang==='ko'?'시장구분':'Segment']].map(([m, lbl], i) => (
            <button key={m} onClick={() => setColorMode(m)}
              className={cn('px-2.5 h-6 text-[10px] font-medium uppercase tracking-wider transition-all',
                i > 0 && 'border-l border-neutral-line',
                colorMode === m ? 'bg-sumi-300 text-ivory-50' : 'bg-white text-sumi-100 hover:bg-ivory-100')}>
              {lbl}
            </button>
          ))}
        </div>
        {manual && (
          <>
            <AxisControl label="PBR" lo={pbrLo === '' ? niceNum(auto.pbrLo) : pbrLo} hi={pbrHi === '' ? niceNum(auto.pbrHi) : pbrHi}
              onLo={setPbrLo} onHi={setPbrHi} suffix="x" />
            <AxisControl label="ROE" lo={roeLo === '' ? Math.round(auto.roeLo) : roeLo} hi={roeHi === '' ? Math.round(auto.roeHi) : roeHi}
              onLo={setRoeLo} onHi={setRoeHi} suffix="%" />
            <button onClick={resetAxes} className="text-[10px] uppercase tracking-wider text-vermillion-600 hover:text-vermillion-700">
              {lang==='ko'?'자동 리셋':'Reset'}
            </button>
          </>
        )}
        {!manual && nClamped > 0 && (
          <span className="text-[10px] text-sumi-50">
            {lang==='ko' ? `이상치 ${nClamped}개 가장자리 표시 (자동 범위 조정됨)` : `${nClamped} outliers clamped to edges (auto-ranged)`}
          </span>
        )}
      </div>

      <div className="h-[440px] p-4">
        <ResponsiveContainer width="100%" height="100%">
          <ScatterChart margin={{ top:20, right:30, bottom:50, left:50 }}>
            <CartesianGrid stroke="#E6E1D4" strokeDasharray="1 3" />
            {fx(1) >= xLo && fx(1) <= xHi && (
              <ReferenceArea x1={xLo} x2={fx(1)} y1={Math.max(8,yLo)} y2={yHi} fill="#C7391C" fillOpacity={0.05 * shadeMul} stroke="#C7391C" strokeOpacity={0.3 * shadeMul} strokeDasharray="2 2" />
            )}

/* ==========================================================================
   Filter logic + root App
   ========================================================================== */
const defaultFilters = { search:'', sectors:[], segments:[], perMax:null, pbrMax:null, divMin:null, roeMin:null, advMin:null, shortMin:null, belowBookOnly:false, qualityOnly:false, shortCandidatesOnly:false, recentCatalystOnly:false, activistOnly:false, watchlistOnly:false };
function applyFilters(all, f, watchlist) {
  return all.filter(s => {
    if (f.watchlistOnly && !watchlist.includes(s.ticker)) return false;
    if (f.search.trim()) {
      const q = f.search.trim().toLowerCase();
      const hay = `${s.ticker} ${s.nameEn} ${s.nameKo} ${s.nameJp}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (f.sectors.length && !f.sectors.includes(s.sector)) return false;
    if (f.segments.length && !f.segments.includes(s.segment)) return false;
    if (f.perMax !== null && (s.per === null || s.per > f.perMax)) return false;
    if (f.pbrMax !== null && (s.pbr === null || s.pbr > f.pbrMax)) return false;
    if (f.divMin !== null && (s.dividendYield === null || s.dividendYield < f.divMin)) return false;
    if (f.roeMin !== null && (s.roe === null || s.roe < f.roeMin)) return false;
    if (f.advMin !== null && (s.advValueB == null || s.advValueB < f.advMin)) return false;
    if (f.shortMin !== null && (s.shortPct == null || s.shortPct < f.shortMin)) return false;
    if (f.belowBookOnly && !s.belowBook) return false;
    if (f.shortCandidatesOnly && !s.shortCandidate) return false;
    if (f.recentCatalystOnly && !s.recentCatalyst) return false;
    if (f.activistOnly && !s.activistCandidate) return false;
    if (f.qualityOnly) {
      const ok = (s.roe ?? 0) >= 15 && (s.operatingMargin ?? 0) >= 15 && (s.debtToEquity ?? 99) <= 1.0;
      if (!ok) return false;
    }
    return true;
  });
}

function App() {
  const { watchlist } = useWatchlist();
  const { t, lang } = useLanguage();
  const [payload, setPayload] = useState(null);
  const [error, setError] = useState(null);
  const [filters, setFilters] = useState(defaultFilters);
  const [selected, setSelected] = useState(null);
  const [tick, setTick] = useState(0);  // bumped on retry

  useEffect(() => {
    let cancelled = false;
    setError(null);
    setPayload(null);
    fetch('./data.json', { cache: 'no-store' })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status} ${r.statusText}`);
        return r.json();
      })
      .then(d => { if (!cancelled) setPayload(d); })
      .catch(e => { if (!cancelled) setError(e.message || String(e)); });
    return () => { cancelled = true; };
  }, [tick]);

  if (error) return <ErrorState message={error} onRetry={() => setTick(t => t+1)} />;
  if (!payload) return <LoadingState />;

  const { indices = [], stocks = [], sectorPerformance = [], marketSummary = {}, headlines = [], marketTone = null, asOf, source } = payload;
  const filtered = applyFilters(stocks, filters, watchlist);
  const isBootstrap = typeof source === 'string' && source.toLowerCase().includes('bootstrap');

  return (
    <div className="min-h-screen flex flex-col">
      <Header asOf={asOf} />
      <main className="flex-1 w-full max-w-[1440px] mx-auto px-6 lg:px-10 pb-16">
        {isBootstrap && (
          <div className="mt-6 px-4 py-3 border border-vermillion-100 bg-vermillion-50 text-[11px] text-vermillion-600 flex items-start gap-2">
            <IconAlert size={14} className="flex-shrink-0 mt-0.5"/>
            <div>
              {lang === 'ko'
                ? '현재 부트스트랩 샘플 데이터가 표시되고 있습니다. GitHub Actions가 처음 실행되면 실제 Yahoo Finance 데이터로 자동 교체됩니다.'
                : 'Showing bootstrap sample data. Live Yahoo Finance values will replace this on the first GitHub Actions run.'}
            </div>
          </div>
        )}
        <section className="pt-8 pb-10">
          <div className="flex items-end justify-between mb-6">
            <div>
              <div className="text-[11px] tracking-[0.28em] uppercase text-sumi-50 mb-2">{t('sectionIndices')}</div>
              <h2 className="font-display text-[28px] leading-tight tracking-tight text-sumi-300">{t('tagline')}</h2>
            </div>
            <div className="hidden lg:block text-xs text-sumi-50 tabular">
              <span className="inline-flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full bg-bull animate-pulse-soft"/>
                {t('marketOpen')} · TSE 09:00 – 15:00 JST
              </span>
            </div>
          </div>
          <IndexDashboard indices={indices}/>
        </section>
        <div className="editorial-rule mb-10"/>
        <section className="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-14">
          <div className="lg:col-span-5"><MarketSummary summary={marketSummary}/></div>
          <div className="lg:col-span-7"><SectorHeatmap sectors={sectorPerformance}/></div>
        </section>
        <div className="editorial-rule mb-10"/>
        <section className="mb-14">
          <div className="mb-6">
            <div className="text-[11px] tracking-[0.28em] uppercase text-sumi-50 mb-2">{t('sectionValuationMap')}</div>
            <h3 className="font-display text-[28px] leading-tight tracking-tight text-sumi-300">{t('sectionValuationMap')}</h3>
          </div>
          <ValuationChart data={filtered.length ? filtered : stocks}/>
        </section>
        <div className="editorial-rule mb-10"/>
        <section id="screener" className="mb-14 scroll-mt-20">
          <div className="mb-6">
            <div className="text-[11px] tracking-[0.28em] uppercase text-sumi-50 mb-2">{t('sectionScreener')}</div>
            <h3 className="font-display text-[28px] leading-tight tracking-tight text-sumi-300 rising-sun pl-4">{t('sectionScreener')}</h3>
          </div>
          <ScreenerFilter value={filters} onChange={setFilters} resultCount={filtered.length}/>
          <StockTable rows={filtered} onSelect={s => setSelected(s)}/>
        </section>
        <div className="editorial-rule mb-10"/>
        <section id="book" className="mb-14 scroll-mt-20">
          <div className="mb-6">
            <div className="text-[11px] tracking-[0.28em] uppercase text-sumi-50 mb-2">{t('sectionBook')}</div>
            <h3 className="font-display text-[28px] leading-tight tracking-tight text-sumi-300 rising-sun pl-4">{t('sectionBook')}</h3>
          </div>
          <PortfolioBook stocks={stocks}/>
        </section>
        <div className="editorial-rule mb-10"/>
        <section id="research" className="mb-14 scroll-mt-20">
          <div className="mb-6">
            <div className="text-[11px] tracking-[0.28em] uppercase text-sumi-50 mb-2">
              {lang === 'ko' ? '리서치' : 'Research'}
            </div>
            <h3 className="font-display text-[28px] leading-tight tracking-tight text-sumi-300">
              {lang === 'ko' ? '리서치' : 'Research'}
            </h3>
          </div>
          <MarketHeadlines headlines={headlines} tone={marketTone}/>
        </section>
      </main>
      <footer className="border-t border-neutral-line py-8">
        <div className="max-w-[1440px] mx-auto px-6 lg:px-10 flex flex-col md:flex-row items-start md:items-center justify-between gap-3 text-xs text-sumi-50">
          <div className="flex items-center gap-3">
            <span className="inline-block w-2 h-2 rounded-full bg-vermillion-500"/>
            <span>© {new Date().getFullYear()} NIHON · TSE Research Terminal</span>
            {source && <span className="text-sumi-50/60 font-mono text-[10px] tabular">· {source}</span>}
          </div>
          <div className="max-w-xl leading-relaxed">{t('footerDisclaimer')}</div>
        </div>
      </footer>
      <StockDetailPanel stock={selected} onClose={() => setSelected(null)}/>
    </div>
  );
}

/* ==========================================================================
   Mount
   ========================================================================== */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <LanguageProvider><WatchlistProvider><BookProvider>
    <App/>
  </BookProvider></WatchlistProvider></LanguageProvider>
);

// Fade out splash
requestAnimationFrame(() => {
  const splash = document.getElementById('splash');
  if (splash) {
    setTimeout(() => {
      splash.classList.add('hidden');
      setTimeout(() => splash.remove(), 500);
    }, 200);
  }
});
</script>
</body>
</html>
